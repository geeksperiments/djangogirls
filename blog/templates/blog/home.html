<!DOCTYPE html>
<html>

<head>
    <title>My Django Blog</title>
</head>

<body>
    <h1>My Django Blog</h1>
    {% for post in posts %}
    <article>
        <h2>{{ post.title }}</h2>
        <p>{{ post.text }}</p>
        <small>Published: {{ post.created_date }}</small>
    </article>
    <hr>
    {% endfor %}
</body>

</html>
